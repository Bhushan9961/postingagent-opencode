services:
  - type: web
    name: ai-marketing-backend
    runtime: python
    repo: https://github.com/Bhushan9961/-postingagent-opencode
    rootDir: apps/backend
    region: oregon
    plan: free
    buildCommand: >
      pip install -e ../../packages/shared-types
      -e ../../packages/agent-core
      -e ../../packages/llm-client
      && pip install .
    startCommand: >
      uvicorn app.main:app --host 0.0.0.0 --port 10000
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: DATABASE_URL
        fromDatabase:
          type: postgres
          name: ai-marketing-db
      - key: SUPABASE_URL
        value: https://mmeycvrjbkmuctpkzcqg.supabase.co
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: NVIDIA_API_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"
      - key: ALLOWED_ORIGINS
        value: '["https://main--postingagent-opencode.netlify.app"]'

databases:
  - name: ai-marketing-db
    plan: free
    region: oregon
    postgresMajorVersion: 16
