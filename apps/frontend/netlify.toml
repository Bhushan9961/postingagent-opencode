[build]
  command = "npx -y pnpm@latest install --no-frozen-lockfile && npx -y pnpm@latest --filter frontend run build"
  publish = "apps/frontend/dist"

[functions]
  directory = "apps/frontend/.netlify/functions-internal"

[context.production.environment]
  NUXT_PUBLIC_API_BASE_URL = "https://ai-marketing-backend-avre.onrender.com/api/v1"
